<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#0A0A0A"/>
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#1A1A1A"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#dots)"/>
  <!-- Slash accent large -->
  <polygon points="900,560 1020,40 1080,40 960,560" fill="#00E5FF" opacity="0.05"/>
  <!-- Logo -->
  <circle cx="100" cy="80" r="36" stroke="#E8E8E8" stroke-width="1.5" fill="none"/>
  <line x1="86" y1="106" x2="114" y2="54" stroke="#00E5FF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="156" y="94" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#00E5FF">/</text>
  <text x="174" y="94" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#E8E8E8">oli</text>
  <!-- Headline -->
  <text x="100" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Execute.</text>
  <text x="100" y="390" font-family="'Helvetica Neue', Arial, sans-serif" font-size="80" font-weight="300" fill="#9A9A9A" letter-spacing="-2">Don't just chat.</text>
  <text x="100" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#3A3A3A">AI-first execution layer — automate, code, orchestrate.</text>
  <rect x="100" y="510" width="100" height="2" fill="#00E5FF"/>
</svg>
