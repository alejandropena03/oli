<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#1A1A1A"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#dots)"/>

  <!-- Central node: /oli logo -->
  <circle cx="600" cy="380" r="70" fill="#111111" stroke="#00E5FF" stroke-width="1.5"/>
  <circle cx="600" cy="380" r="55" stroke="#2A2A2A" stroke-width="1" fill="none"/>
  <line x1="580" y1="412" x2="620" y2="348" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"/>

  <!-- Spoke lines to tool nodes -->
  <!-- GitHub — top right -->
  <line x1="650" y1="330" x2="820" y2="220" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Slack — right -->
  <line x1="670" y1="385" x2="900" y2="385" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Notion — bottom right -->
  <line x1="650" y1="430" x2="820" y2="540" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Terminal — bottom -->
  <line x1="600" y1="450" x2="600" y2="600" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Files — bottom left -->
  <line x1="550" y1="430" x2="380" y2="540" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- APIs — left -->
  <line x1="530" y1="385" x2="300" y2="385" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Browser — top left -->
  <line x1="550" y1="330" x2="380" y2="220" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Tool node boxes -->
  <!-- GitHub -->
  <rect x="800" y="194" width="120" height="52" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" rx="3"/>
  <text x="860" y="225" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#E8E8E8" text-anchor="middle">GitHub</text>
  <!-- Slack -->
  <rect x="900" y="359" width="120" height="52" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" rx="3"/>
  <text x="960" y="390" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#E8E8E8" text-anchor="middle">Slack</text>
  <!-- Notion -->
  <rect x="800" y="514" width="120" height="52" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" rx="3"/>
  <text x="860" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#E8E8E8" text-anchor="middle">Notion</text>
  <!-- Terminal -->
  <rect x="540" y="600" width="120" height="52" fill="#1A1A1A" stroke="#00E5FF" stroke-width="1" rx="3"/>
  <text x="600" y="631" font-family="'Courier New', monospace" font-size="13" fill="#00E5FF" text-anchor="middle">terminal</text>
  <!-- Files -->
  <rect x="260" y="514" width="120" height="52" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" rx="3"/>
  <text x="320" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#E8E8E8" text-anchor="middle">Files</text>
  <!-- APIs -->
  <rect x="180" y="359" width="120" height="52" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" rx="3"/>
  <text x="240" y="390" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#E8E8E8" text-anchor="middle">REST APIs</text>
  <!-- Browser -->
  <rect x="260" y="194" width="120" height="52" fill="#1A1A1A" stroke="#3A3A3A" stroke-width="1" rx="3"/>
  <text x="320" y="225" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#E8E8E8" text-anchor="middle">Browser</text>

  <!-- Animated flow dots on lines — static approximation -->
  <circle cx="735" cy="275" r="3" fill="#00E5FF" opacity="0.7"/>
  <circle cx="785" cy="337" r="3" fill="#00E5FF" opacity="0.4"/>
  <circle cx="600" cy="520" r="3" fill="#00E5FF" opacity="0.6"/>

  <!-- Headline -->
  <text x="600" y="120" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">One operator. Every tool.</text>
  <text x="600" y="168" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="#9A9A9A" text-anchor="middle">/oli orchestrates your entire stack from a single interface.</text>
</svg>
