<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#1A1A1A"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="#0A0A0A"/>
  <rect width="1200" height="800" fill="url(#g)"/>

  <!-- Left: waveform (voice/speech) -->
  <!-- Bars of varying height, platinum, centered vertically at y=400 -->
  <rect x="80"  y="360" width="8" height="80" fill="#9A9A9A" rx="4"/>
  <rect x="96"  y="320" width="8" height="160" fill="#E8E8E8" rx="4"/>
  <rect x="112" y="350" width="8" height="100" fill="#C0C0C0" rx="4"/>
  <rect x="128" y="340" width="8" height="120" fill="#E8E8E8" rx="4"/>
  <rect x="144" y="370" width="8" height="60" fill="#9A9A9A" rx="4"/>
  <rect x="160" y="330" width="8" height="140" fill="#E8E8E8" rx="4"/>
  <rect x="176" y="355" width="8" height="90" fill="#C0C0C0" rx="4"/>
  <rect x="192" y="345" width="8" height="110" fill="#E8E8E8" rx="4"/>
  <rect x="208" y="365" width="8" height="70" fill="#9A9A9A" rx="4"/>
  <rect x="224" y="375" width="8" height="50" fill="#555555" rx="4"/>
  <rect x="240" y="380" width="8" height="40" fill="#3A3A3A" rx="4"/>

  <!-- Label: VOICE INPUT -->
  <text x="80" y="520" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#555555" letter-spacing="3">VOICE INPUT</text>

  <!-- Center: /oli transform arrow -->
  <line x1="290" y1="400" x2="490" y2="400" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- /oli box -->
  <rect x="380" y="370" width="120" height="60" fill="#111111" stroke="#00E5FF" stroke-width="1" rx="4"/>
  <!-- Circle slash mark inside box -->
  <circle cx="440" cy="400" r="22" stroke="#E8E8E8" stroke-width="1" fill="none"/>
  <line x1="428" y1="418" x2="452" y2="382" stroke="#00E5FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrow right -->
  <line x1="510" y1="400" x2="700" y2="400" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="700,394 720,400 700,406" fill="#00E5FF"/>

  <!-- Label under center -->
  <text x="400" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#00E5FF" letter-spacing="2" text-anchor="middle">/oli</text>

  <!-- Right: Terminal output -->
  <rect x="720" y="300" width="400" height="200" fill="#111111" stroke="#2A2A2A" stroke-width="1" rx="4"/>
  <!-- Terminal chrome -->
  <rect x="720" y="300" width="400" height="28" fill="#1A1A1A" rx="4"/>
  <circle cx="744" cy="314" r="5" fill="#3A3A3A"/>
  <circle cx="762" cy="314" r="5" fill="#3A3A3A"/>
  <circle cx="780" cy="314" r="5" fill="#3A3A3A"/>
  <!-- Terminal text -->
  <text x="740" y="352" font-family="'Courier New', monospace" font-size="13" fill="#00E5FF">$ /oli run deploy --env production</text>
  <text x="740" y="374" font-family="'Courier New', monospace" font-size="13" fill="#9A9A9A">→ Running pre-deploy checks...</text>
  <text x="740" y="396" font-family="'Courier New', monospace" font-size="13" fill="#9A9A9A">→ Building artifact...</text>
  <text x="740" y="418" font-family="'Courier New', monospace" font-size="13" fill="#00FF87">✓ Deployed to production</text>
  <rect x="740" y="440" width="8" height="14" fill="#E8E8E8"/>

  <!-- Label -->
  <text x="720" y="520" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#555555" letter-spacing="3">EXECUTION OUTPUT</text>

  <!-- Headline -->
  <text x="80" y="620" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Say it. /oli runs it.</text>
  <text x="80" y="670" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#9A9A9A">From intent to execution. No friction.</text>
</svg>
